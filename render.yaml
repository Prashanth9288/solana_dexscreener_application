services:
  - type: web
    name: solana-dexscreener-backend
    runtime: node
    plan: free
    # Build and start commands explicitly cd into the subdirectory.
    # This works regardless of any "Root Directory" setting in the dashboard.
    buildCommand: cd solana-backend && npm install
    startCommand: cd solana-backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: true
    healthCheckPath: /health
